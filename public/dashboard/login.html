<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp API — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117; color: #e1e4e8;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-wrap { width: 100%; max-width: 380px; padding: 24px; }
    .logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 32px; }
    .logo h1 { font-size: 20px; font-weight: 700; }
    .card {
      background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 32px;
    }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 24px; text-align: center; color: #e1e4e8; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; font-weight: 500; }
    input {
      width: 100%; padding: 10px 14px;
      background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      color: #e1e4e8; font-size: 14px; outline: none; transition: border-color .15s;
    }
    input:focus { border-color: #58a6ff; }
    .btn {
      width: 100%; padding: 11px; border-radius: 6px; font-size: 14px; font-weight: 600;
      background: #238636; border: 1px solid #2ea043; color: #fff;
      cursor: pointer; margin-top: 8px; transition: background .15s;
    }
    .btn:hover { background: #2ea043; }
    .btn:active { transform: scale(0.99); }
    .error-box {
      background: #3d1b1b; border: 1px solid #f85149; color: #f85149;
      border-radius: 6px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
      display: none;
    }
    .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #8b949e; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="#3fb950">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
      </svg>
      <h1>WhatsApp API</h1>
    </div>

    <div class="card">
      <h2>Login Admin</h2>

      <div class="error-box" id="error-box">
        Username atau password salah.
      </div>

      <form method="POST" action="/dashboard/login">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" autofocus required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn">Masuk</button>
      </form>
    </div>

    <div class="footer">WhatsApp Multi-Session API</div>
  </div>

  <script>
    // Show error if ?error=1
    if (new URLSearchParams(location.search).get('error') === '1') {
      document.getElementById('error-box').style.display = 'block'
    }
  </script>
</body>
</html>
